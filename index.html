<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wait... I have something to say 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0f172a;
            background-image: radial-gradient(circle at 50% -20%, #3b0764, #0f172a);
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .glow-text {
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }
        /* Fade transition class */
        .fade-in {
            animation: fadeIn 0.8s ease-in-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center text-white overflow-hidden p-4">
    
    <div id="app" class="glass-card rounded-3xl p-8 max-w-md w-full text-center relative overflow-hidden h-[500px] flex flex-col justify-center">
        </div>

    <script>
        const app = document.getElementById('app');
        let stream;

        // --- STEP 1: The Suspense ---
        const stepOne = () => {
            app.innerHTML = `
                <div class="fade-in">
                    <div class="text-6xl mb-6 animate-bounce">💌</div>
                    <h1 class="text-2xl font-bold mb-4 text-gray-200">You have a special delivery...</h1>
                    <p class="text-sm text-gray-400 mb-8 px-4">Lekin ise kholne se pehle ek promise karni hogi ki pura gussa ek side rakh kar isko dekhogi.</p>
                    
                    <button onclick="stepTwo()" class="bg-white/10 hover:bg-white/20 border border-white/30 text-white font-semibold py-3 px-8 rounded-full transition duration-300 w-full mb-3">
                        Promise ✨
                    </button>
                    <button onclick="alert('Aise kaise? Gussa toh nikalna padega! Wapas dabao uper wala button. 😂')" class="text-xs text-gray-500 hover:text-red-400 underline decoration-dotted transition mt-4">
                        Nahi karni promise! 😡
                    </button>
                </div>
            `;
        }

        // --- STEP 2: The Apology ---
        const stepTwo = () => {
            app.innerHTML = `
                <div class="fade-in text-left">
                    <h1 class="text-3xl font-extrabold mb-4 text-pink-400 glow-text">Hey Mohtarma... 🥺</h1>
                    <p class="text-md mb-6 text-gray-300">Maanta hu thodi galti hui hai mujhse, par ab narazgi chhod do na.</p>
                    
                    <div class="italic text-pink-200 mb-8 border-l-4 border-pink-500 pl-4 py-3 bg-gradient-to-r from-pink-500/10 to-transparent rounded-r-xl shadow-inner">
                        "Tere gusse me bhi ek alag hi noor hai,<br>
                        Par teri khushi ke aage sab choor-choor hai..."
                    </div>
                    
                    <p class="text-sm text-gray-400 mb-8 text-center">Bohot mehnat lagi hai isko code karne me... bas ek aakhri cheez aur mangni thi tumse.</p>
                    
                    <button onclick="stepThree()" class="bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white font-bold py-3 px-8 rounded-full transition transform hover:scale-105 shadow-[0_0_20px_rgba(236,72,153,0.4)] w-full">
                        Kya Chahiye? 👀
                    </button>
                </div>
            `;
        }

        // --- STEP 3: The Camera Catch ---
        const stepThree = async () => {
            app.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-xl font-bold mb-4 text-pink-300">Tumhari sabse cute wali smile... 📸</h2>
                    <p class="text-xs text-gray-400 mb-4">I swear my day feels incomplete without it.</p>
                    
                    <div class="relative w-full max-w-xs mx-auto rounded-xl overflow-hidden border-2 border-pink-500 mb-6 shadow-[0_0_15px_rgba(236,72,153,0.3)] bg-black h-48 flex items-center justify-center">
                        <p id="cam-loading" class="text-sm text-gray-500 animate-pulse">Starting camera...</p>
                        <video id="video" autoplay playsinline class="w-full h-full object-cover transform scale-x-[-1] absolute inset-0 hidden"></video>
                    </div>
                    
                    <button id="click-btn" onclick="takePhoto()" class="bg-gradient-to-r from-green-400 to-emerald-600 hover:from-green-500 hover:to-emerald-700 text-white font-bold py-3 px-8 rounded-full transition transform hover:scale-105 shadow-[0_0_20px_rgba(52,211,153,0.4)] w-full opacity-50 cursor-not-allowed" disabled>
                        Getting ready...
                    </button>
                    <canvas id="canvas" class="hidden"></canvas>
                </div>
            `;

            const video = document.getElementById('video');
            const loadingText = document.getElementById('cam-loading');
            const btn = document.getElementById('click-btn');

            try {
                // Request front camera
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                
                // Wait for video to actually start playing
                video.onloadedmetadata = () => {
                    video.play();
                    video.classList.remove('hidden');
                    loadingText.classList.add('hidden');
                    
                    // Enable button
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    btn.innerHTML = 'Click It! 💖';
                };
            } catch (err) {
                app.innerHTML = `
                    <div class="fade-in">
                        <div class="text-5xl mb-4">😢</div>
                        <p class="text-red-400 mb-4 font-semibold">Camera access chahiye yaar!</p>
                        <p class="text-sm text-gray-400 mb-6">Bina camera ke tumhari smile kaise dekhunga? Browser setting se permission allow kardo please.</p>
                        <button onclick="stepTwo()" class="bg-white/10 py-2 px-6 rounded-full border border-white/20">Go Back</button>
                    </div>
                `;
            }
        }

        // --- STEP 4: Capture & Save ---
        const takePhoto = () => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Native mirror effect handling
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/png');

            // Stop camera instantly
            stream.getTracks().forEach(track => track.stop());

            app.innerHTML = `
                <div class="fade-in flex flex-col items-center justify-center h-full">
                    <div class="w-16 h-16 border-4 border-pink-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <h2 class="text-xl font-bold animate-pulse text-pink-400">Saving this moment... ✨</h2>
                </div>
            `;

            // Send to your Node.js backend (which sends it to Backblaze)
            fetch('/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataUrl })
            }).then(() => {
                app.innerHTML = `
                    <div class="fade-in">
                        <div class="animate-bounce text-6xl mb-4 mt-8">🥰</div>
                        <h1 class="text-3xl font-bold mb-2 text-green-400 glow-text">Got It!</h1>
                        <p class="text-md text-gray-200 mb-8">Thank you! You just made my day completely perfect.</p>
                        
                        <div class="bg-black/30 p-5 rounded-xl border border-white/10 text-left backdrop-blur-sm">
                            <div class="flex items-center justify-between mb-2">
                                <p class="text-sm text-pink-300 font-bold uppercase tracking-wider">Flex Time 💅</p>
                                <span class="text-xs bg-pink-500/20 text-pink-200 py-1 px-2 rounded">Verified Boy Math</span>
                            </div>
                            <p class="text-xs text-gray-400 leading-relaxed">
                                Screenshot this and tell your friends your guy literally coded an entire custom app just to see you smile. That's the standard now. 😎
                            </p>
                        </div>
                    </div>
                `;
            }).catch(err => {
                app.innerHTML = `<p class="text-red-400 mt-10">Oops, network issue. But at least you smiled! ❤️</p>`;
            });
        }

        // Initialize App on Step 1
        stepOne();
    </script>
</body>
</html>
